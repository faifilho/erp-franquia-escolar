let _filtroRel = { de: null, ate: null };
function pageRelatorios(){
  const root = el('div');
  if (!_filtroRel.ate) _filtroRel.ate = monthISO();
  if (!_filtroRel.de){
    const d = new Date(); d.setMonth(d.getMonth() - 5);
    _filtroRel.de = d.toISOString().slice(0,7);
  }

  const filtros = el('div', { class: 'page-actions' });
  const filtrosLeft = el('div', { class: 'filters' });
  filtrosLeft.appendChild(el('input', { type: 'month', class: 'form-control', style: { width: '160px' }, value: _filtroRel.de, onchange: (e) => { _filtroRel.de = e.target.value; atualizar(); } }));
  filtrosLeft.appendChild(el('input', { type: 'month', class: 'form-control', style: { width: '160px' }, value: _filtroRel.ate, onchange: (e) => { _filtroRel.ate = e.target.value; atualizar(); } }));
  filtros.appendChild(filtrosLeft);
  const btnExp = el('button', { class: 'btn btn-secondary', html: ICONS.download + '<span>Exportar CSV</span>', onclick: () => exportarDRE() });
  filtros.appendChild(btnExp);
  root.appendChild(filtros);

  const summaryHolder = el('div');
  const tableHolder = el('div');
  root.append(summaryHolder, tableHolder);

  function gerarMeses(){
    const meses = [];
    let [yD, mD] = _filtroRel.de.split('-').map(Number);
    const [yA, mA] = _filtroRel.ate.split('-').map(Number);
    let y = yD, m = mD, safety = 0;
    while ((y < yA || (y === yA && m <= mA)) && safety++ < 60){
      meses.push(`${y}-${String(m).padStart(2,'0')}`);
      m++;
      if (m > 12){ m = 1; y++; }
    }
    return meses;
  }

  function atualizar(){
    const lancamentos = scopedList('lancamentos');
    const meses = gerarMeses();
    const dados = meses.map(mes => {
      const nM = lancamentos.filter(l => (l.data||'').startsWith(mes));
      const ent = nM.filter(l => l.tipo === 'entrada').reduce((a,b)=>a+Number(b.valor||0),0);
      const sai = nM.filter(l => l.tipo === 'saida').reduce((a,b)=>a+Number(b.valor||0),0);
      return { mes, ent, sai, res: ent - sai };
    });
    const totalEnt = dados.reduce((a,b)=>a+b.ent, 0);
    const totalSai = dados.reduce((a,b)=>a+b.sai, 0);
    const totalRes = totalEnt - totalSai;

    summaryHolder.innerHTML = '';
    summaryHolder.appendChild(el('div', { class: 'grid-metrics' }, [
      metricCard('Total de receitas', fmtBRL(totalEnt), 'positive', meses.length + ' meses'),
      metricCard('Total de despesas', fmtBRL(totalSai), 'negative', meses.length + ' meses'),
      metricCard('Resultado líquido', fmtBRL(totalRes), totalRes >= 0 ? 'positive' : 'negative', 'Margem: ' + (totalEnt > 0 ? ((totalRes/totalEnt)*100).toFixed(1) + '%' : '—'))
    ]));

    tableHolder.innerHTML = '';
    const card = el('div', { class: 'card' });
    card.appendChild(el('div', { class: 'card-header' }, [ el('div', { class: 'card-title' }, 'Demonstrativo mês a mês') ]));
    const tbl = el('table', { class: 'data-table' });
    tbl.appendChild(el('thead', {}, el('tr', {}, [
      el('th', {}, 'Mês'),
      el('th', { class: 'num' }, 'Receitas'),
      el('th', { class: 'num' }, 'Despesas'),
      el('th', { class: 'num' }, 'Resultado'),
      el('th', { class: 'num' }, 'Margem')
    ])));
    const tbody = el('tbody');
    for (const d of dados){
      const [y, m] = d.mes.split('-');
      const mesLabel = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][Number(m)-1] + '/' + y.slice(2);
      const margem = d.ent > 0 ? ((d.res/d.ent)*100).toFixed(1) + '%' : '—';
      tbody.appendChild(el('tr', {}, [
        el('td', { style: { fontWeight: 600 } }, mesLabel),
        el('td', { class: 'num', style: { color: 'var(--success)' } }, fmtBRL(d.ent)),
        el('td', { class: 'num', style: { color: 'var(--danger)' } }, fmtBRL(d.sai)),
        el('td', { class: 'num', style: { color: d.res >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: 700 } }, fmtBRL(d.res)),
        el('td', { class: 'num' }, margem)
      ]));
    }
    tbody.appendChild(el('tr', { style: { background: 'var(--surface-2)' } }, [
      el('td', { style: { fontWeight: 800 } }, 'TOTAL'),
      el('td', { class: 'num', style: { color: 'var(--success)', fontWeight: 800 } }, fmtBRL(totalEnt)),
      el('td', { class: 'num', style: { color: 'var(--danger)', fontWeight: 800 } }, fmtBRL(totalSai)),
      el('td', { class: 'num', style: { color: totalRes >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: 800 } }, fmtBRL(totalRes)),
      el('td', { class: 'num', style: { fontWeight: 800 } }, totalEnt > 0 ? ((totalRes/totalEnt)*100).toFixed(1) + '%' : '—')
    ]));
    tbl.appendChild(tbody);
    card.appendChild(el('div', { class: 'table-wrap' }, tbl));
    tableHolder.appendChild(card);
  }

  function exportarDRE(){
    const lancamentos = scopedList('lancamentos');
    const meses = gerarMeses();
    let csv = 'Mês;Receitas;Despesas;Resultado;Margem\n';
    for (const mes of meses){
      const nM = lancamentos.filter(l => (l.data||'').startsWith(mes));
      const ent = nM.filter(l => l.tipo === 'entrada').reduce((a,b)=>a+Number(b.valor||0),0);
      const sai = nM.filter(l => l.tipo === 'saida').reduce((a,b)=>a+Number(b.valor||0),0);
      const res = ent - sai;
      const margem = ent > 0 ? ((res/ent)*100).toFixed(1) + '%' : '';
      csv += `${mes};${ent.toFixed(2).replace('.',',')};${sai.toFixed(2).replace('.',',')};${res.toFixed(2).replace('.',',')};${margem}\n`;
    }
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = el('a', { href: url, download: `DRE_${_filtroRel.de}_${_filtroRel.ate}.csv` });
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('Exportado.', 'success');
  }

  atualizar();
  return root;
}

/* =========================================
   17. PAGE: USUÁRIOS
   ========================================= */
function pageUsuarios(){
  const root = el('div');
  const filtros = el('div', { class: 'page-actions' });
  filtros.appendChild(el('div', {}));
  filtros.appendChild(el('button', { class: 'btn btn-primary', html: ICONS.plus + '<span>Novo usuário</span>', onclick: () => usuarioModal() }));
  root.appendChild(filtros);

  const card = el('div', { class: 'card' });
  const tbl = el('table', { class: 'data-table' });
  tbl.appendChild(el('thead', {}, el('tr', {}, [
    el('th', {}, 'Nome'), el('th', {}, 'E-mail'), el('th', {}, 'Perfil'), el('th', {}, 'Unidade'), el('th', {}, 'Status'), el('th', { class: 'actions' }, '')
  ])));
  const tbody = el('tbody');
  for (const u of DB.usuarios){
    tbody.appendChild(el('tr', {}, [
      el('td', { style: { fontWeight: 600 } }, u.nome),
      el('td', {}, u.email),
      el('td', {}, el('span', { class: 'badge badge-primary' }, ROLES[u.role]?.label || u.role)),
      el('td', {}, u.empresaId ? empresaNome(u.empresaId) : el('span', { class: 'text-muted' }, 'Todas')),
      el('td', {}, el('span', { class: 'badge ' + (u.ativo !== false ? 'badge-success' : 'badge-neutral') }, [ el('span', { class: 'badge-dot' }), u.ativo !== false ? 'Ativo' : 'Inativo' ])),
      el('td', { class: 'actions' }, [
        el('button', { class: 'btn-icon', title: 'Editar', html: ICONS.edit, onclick: () => usuarioModal(u) }),
        (u.id !== currentUser().id && canDelete()) ? el('button', { class: 'btn-icon danger', title: 'Excluir', html: ICONS.trash, onclick: () => confirmDelete('usuarios', u.id, 'Excluir usuário "' + u.nome + '"?') }) : null
      ])
    ]));
  }
  tbl.appendChild(tbody);
  card.appendChild(el('div', { class: 'table-wrap' }, tbl));
  root.appendChild(card);
  return root;
}

function usuarioModal(existing){
  const isEdit = !!existing;
  const item = existing ? {...existing} : { id: null, nome: '', email: '', role: 'operacional', empresaId: null, ativo: true };
  const body = el('div');

  body.appendChild(el('div', { class: 'form-group' }, [
    el('label', { class: 'form-label' }, [el('span', {}, 'Nome '), el('span', { class: 'req' }, '*')]),
    el('input', { class: 'form-control', id: 'us-nome', type: 'text', value: item.nome || '' })
  ]));
  body.appendChild(el('div', { class: 'form-group' }, [
    el('label', { class: 'form-label' }, [el('span', {}, 'E-mail '), el('span', { class: 'req' }, '*')]),
    el('input', { class: 'form-control', id: 'us-email', type: 'email', value: item.email || '', disabled: isEdit }),
    isEdit ? el('div', { class: 'form-hint' }, 'O e-mail não pode ser alterado após a criação.') : null
  ]));
  if (!isEdit){
    body.appendChild(el('div', { class: 'form-group' }, [
      el('label', { class: 'form-label' }, [el('span', {}, 'Senha inicial '), el('span', { class: 'req' }, '*')]),
      el('input', { class: 'form-control', id: 'us-senha', type: 'text', placeholder: 'Mínimo 6 caracteres', value: '' }),
      el('div', { class: 'form-hint' }, 'O usuário poderá trocar a senha depois (recuperar por e-mail).')
    ]));
  }

  const roleSel = el('select', { class: 'form-control', id: 'us-role', onchange: (e) => {
    const empSel = $('#us-emp');
    if (empSel){ empSel.disabled = e.target.value === 'admin'; if (e.target.value === 'admin') empSel.value = ''; }
  }});
  for (const k in ROLES){
    const o = el('option', { value: k }, ROLES[k].label);
    if (k === item.role) o.selected = true;
    roleSel.appendChild(o);
  }
  body.appendChild(el('div', { class: 'form-group' }, [ el('label', { class: 'form-label' }, 'Perfil'), roleSel ]));

  const empSel = el('select', { class: 'form-control', id: 'us-emp', disabled: item.role === 'admin' });
  empSel.appendChild(el('option', { value: '' }, '— Sem unidade (admin) —'));
  for (const emp of DB.empresas){
    const o = el('option', { value: emp.id }, emp.nome);
    if (emp.id === item.empresaId) o.selected = true;
    empSel.appendChild(o);
  }
  body.appendChild(el('div', { class: 'form-group' }, [ el('label', { class: 'form-label' }, 'Unidade'), empSel ]));

  body.appendChild(el('div', { class: 'form-group' }, [
    el('label', { class: 'form-label flex gap-8', style: { alignItems: 'center', cursor: 'pointer' } }, [
      el('input', { type: 'checkbox', id: 'us-ativo', checked: item.ativo !== false }),
      el('span', {}, 'Usuário ativo (pode fazer login)')
    ])
  ]));

  async function salvar(){
    const nome = $('#us-nome').value.trim();
    const email = $('#us-email').value.trim().toLowerCase();
    const senhaRaw = isEdit ? '' : ($('#us-senha').value || '');
    const role = $('#us-role').value;
    const empVal = $('#us-emp').value;
    const ativo = $('#us-ativo').checked;

    if (!nome){ toast('Informe o nome.', 'error'); return; }
    if (!email || !email.includes('@')){ toast('E-mail inválido.', 'error'); return; }
    const dup = DB.usuarios.find(u => (u.email||'').toLowerCase() === email && u.id !== item.id);
    if (dup){ toast('Já existe usuário com este e-mail.', 'error'); return; }
    if (!isEdit && (!senhaRaw || senhaRaw.length < 6)){ toast('Senha deve ter pelo menos 6 caracteres.', 'error'); return; }

    const empresaId = role === 'admin' ? null : (empVal || null);
    if (role !== 'admin' && !empresaId){ toast('Selecione uma unidade para este perfil.', 'error'); return; }

    const btn = $('#us-salvar');
    if (btn){ btn.disabled = true; btn.textContent = isEdit ? 'Salvando...' : 'Criando...'; }

    try {
      if (isEdit){
        await fbUpdate('usuarios', item.id, { nome, role, empresaId, ativo });
        closeModal();
        toast('Usuário atualizado.', 'success');
        render();
      } else {
        // Cria usuário em uma "app secundária" para não deslogar o admin atual
        const secName = 'secondary_' + Date.now();
        const secApp = firebase.initializeApp(FIREBASE_CONFIG, secName);
        try {
          const secAuth = secApp.auth();
          const cred = await secAuth.createUserWithEmailAndPassword(email, senhaRaw);
          const newUid = cred.user.uid;
          await secAuth.signOut();
          // Cria doc em /usuarios/{newUid}
          await fbSet('usuarios', newUid, { nome, email, role, empresaId, ativo, criadoEm: firebase.firestore.FieldValue.serverTimestamp() });
          closeModal();
          toast('Usuário criado com sucesso.', 'success');
          render();
        } finally {
          await secApp.delete();
        }
      }
    } catch(e){
      console.error(e);
      let msg = 'Erro ao salvar usuário.';
      if (e.code === 'auth/email-already-in-use') msg = 'Este e-mail já está cadastrado no Firebase Authentication.';
      else if (e.code === 'auth/invalid-email') msg = 'E-mail inválido.';
      else if (e.code === 'auth/weak-password') msg = 'Senha muito fraca (mínimo 6 caracteres).';
      else if (e.message) msg = e.message;
      toast(msg, 'error');
      if (btn){ btn.disabled = false; btn.textContent = isEdit ? 'Salvar' : 'Criar'; }
    }
  }

  const footer = el('div', { class: 'flex gap-8' }, [
    el('button', { class: 'btn btn-secondary', type: 'button', onclick: closeModal }, 'Cancelar'),
    el('button', { class: 'btn btn-primary', type: 'button', id: 'us-salvar', onclick: salvar }, isEdit ? 'Salvar' : 'Criar')
  ]);
  openModal({ title: isEdit ? 'Editar usuário' : 'Novo usuário', body, footer });
}

/* =========================================
   18. INIT (Firebase)
   ========================================= */
document.addEventListener('DOMContentLoaded', () => {
  try {
    initFirebase();
    // onAuthStateChanged dispara imediatamente se já houver sessão
    FB_AUTH.onAuthStateChanged(handleAuthStateChanged);
    render(); // render inicial (loading screen)
  } catch(e){
    console.error('Erro na inicialização:', e);
    LOADING = false;
    const app = $('#app');
    app.innerHTML = '';
    app.appendChild(el('div', { class: 'login-wrap' }, el('div', { class: 'login-card' }, [
      el('div', { class: 'login-title', style: { color: 'var(--danger)' } }, 'Erro ao iniciar'),
      el('div', { class: 'login-sub' }, 'Não foi possível conectar ao Firebase. Verifique sua conexão e tente novamente.'),
      el('pre', { style: { fontSize: '11px', background: 'var(--surface-2)', padding: '12px', borderRadius: '6px', marginTop: '12px', overflow: 'auto' } }, (e.message || String(e)))
    ])));
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'l' && e.ctrlKey && e.shiftKey){ e.preventDefault(); if (SESSION) { logout(); toast('Sessão encerrada.', 'info'); } }
});

</script>
