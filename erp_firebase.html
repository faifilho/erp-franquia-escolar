// ─── GLOBALS ──────────────────────────────────────────────────────────────────
var $ = function(sel,ctx){ return (ctx||document).querySelector(sel); };
var $$ = function(sel,ctx){ return Array.from((ctx||document).querySelectorAll(sel)); };
var h = function(tag,attrs,children){
  var el = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="class") el.className=attrs[k];
    else if(k==="style"&&typeof attrs[k]==="object") Object.assign(el.style,attrs[k]);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else el.setAttribute(k,attrs[k]);
  });
  if(children) [].concat(children).forEach(function(c){
    if(c==null||c===false||c===undefined) return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
};
var frag = function(children){
  var f = document.createDocumentFragment();
  [].concat(children||[]).forEach(function(c){ if(c) f.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return f;
};

// ─── FIRESTORE OPERATIONS ────────────────────────────────────────────────────
async function loadAll() {
  var cols = ["lan","pagar","receber","alunos","cursos","fornecedores","usuarios"];
  for (var i=0; i<cols.length; i++) {
    var snap = await FS.collection(cols[i]).get();
    DB[cols[i]] = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
  }
}

async function fsAdd(col, data) {
  var d = Object.assign({}, data); delete d.id;
  var ref = await FS.collection(col).add(d);
  d.id = ref.id;
  if (!DB[col]) DB[col] = [];
  DB[col].push(d);
  render();
}

async function fsSet(col, data) {
  var id = String(data.id);
  var d = Object.assign({}, data); delete d.id;
  await FS.collection(col).doc(id).set(d);
  var idx = DB[col].findIndex(function(x){ return String(x.id)===id; });
  if (idx >= 0) DB[col][idx] = Object.assign({id:data.id}, d);
  render();
}

async function fsDel(col, id) {
  await FS.collection(col).doc(String(id)).delete();
  DB[col] = DB[col].filter(function(x){ return String(x.id)!==String(id); });
  render();
}

async function saveItem(col, data) {
  if (data.id) return fsSet(col, data);
  return fsAdd(col, data);
}

// ─── AUTH OPERATIONS ─────────────────────────────────────────────────────────
async function doLogin(email, pwd) {
  await FA.signInWithEmailAndPassword(email, pwd);
  STATE.adminCreds = {email:email, pwd:pwd};
}

async function doLogout() {
  await FA.signOut();
  STATE.user=null; STATE.profile=null; STATE.empId=null; STATE.mod="dash";
  DB = {lan:[],pagar:[],receber:[],alunos:[],cursos:[],fornecedores:[],usuarios:[]};
  render();
}

async function reloginAdmin() {
  if (STATE.adminCreds) await FA.signInWithEmailAndPassword(STATE.adminCreds.email, STATE.adminCreds.pwd);
}

async function checkFirstSetup() {
  try {
    var snap = await FS.collection("usuarios").limit(1).get();
    STATE.firstSetup = snap.empty;
  } catch(e) {
    STATE.firstSetup = false;
  }
  STATE.loading = false;
  render();
}

async function runSetup(adminPwd, onMsg) {
  var USERS = [
    {e:"admin@franquia.com",  p:adminPwd,  role:"admin",      empId:null, nome:"Admin Franquia",  av:"AF"},
    {e:"dir.alfa@escola.com", p:"Alfa2025", role:"diretor",    empId:1,    nome:"Carlos Souza",    av:"CS"},
    {e:"dir.beta@escola.com", p:"Beta2025", role:"diretor",    empId:2,    nome:"Fernanda Reis",   av:"FR"},
    {e:"dir.gama@escola.com", p:"Gama2025", role:"diretor",    empId:3,    nome:"Marcos Oliveira", av:"MO"},
    {e:"fin.alfa@escola.com", p:"Fin2025",  role:"financeiro", empId:1,    nome:"Juliana Financas",av:"JF"},
    {e:"op.beta@escola.com",  p:"Op2025",   role:"operacional",empId:2,    nome:"Roberto Op",      av:"RO"},
  ];
  var uids = {};
  onMsg("Criando usuarios ("+USERS.length+")...");
  for (var i=0; i<USERS.length; i++) {
    var u = USERS[i];
    try {
      var cred = await FA.createUserWithEmailAndPassword(u.e, u.p);
      uids[u.e] = cred.user.uid;
      await FA.signOut();
    } catch(err) {
      if (err.code==="auth/email-already-in-use") {
        var sc = await FA.signInWithEmailAndPassword(u.e, u.p);
        uids[u.e] = sc.user.uid;
        await FA.signOut();
      } else { onMsg("Erro: "+err.message); throw err; }
    }
  }
  onMsg("Criando perfis no banco de dados...");
  for (var i=0; i<USERS.length; i++) {
    var u=USERS[i];
    await FS.collection("usuarios").doc(uids[u.e]).set({nome:u.nome,email:u.e,role:u.role,empId:u.empId,av:u.av});
  }
  onMsg("Populando dados iniciais...");
  await seedInitialData();
  onMsg("Finalizando...");
  await FA.signInWithEmailAndPassword("admin@franquia.com", adminPwd);
  STATE.adminCreds = {email:"admin@franquia.com", pwd:adminPwd};
}

// upd() - syncs to Firebase for deletes
function upd(col, fn) {
  var before = DB[col].map(function(x){ return x.id; });
  DB[col] = fn(DB[col]);
  var after = DB[col].map(function(x){ return x.id; });
  // Find deleted items and sync to Firestore
  before.forEach(function(id) {
    if (after.indexOf(id) < 0) {
      FS.collection(col).doc(String(id)).delete().catch(function(e){ console.error("Delete error:", e); });
    }
  });
  render();
}
function setState(patch){ Object.assign(STATE,patch); render(); }

function openModal(data){ STATE.modalData=data; render(); }
function closeModal(){ STATE.modalData=null; render(); }

function buildModal(){
  if(!STATE.modalData) return null;
  var md=STATE.modalData;
  var form=Object.assign({},md.init);

  var bg=h("div",{"class":"modal-bg",onclick:function(e){ if(e.target===bg) closeModal(); }},null);
  var box=h("div",{"class":"modal"},null);
  bg.appendChild(box);

  var mh=h("div",{"class":"modal-head"},[
    h("h3",null,md.title),
    h("button",{style:{lineHeight:"0",color:"#94A3B8"},onclick:closeModal},null)
  ]);
  mh.querySelector("button").innerHTML=SVGS.x;

  var mb=h("div",{"class":"modal-body form-grid"},null);
  var mf=h("div",{"class":"modal-foot"},[
    h("button",{"class":"btn",onclick:closeModal},"Cancelar")
  ]);
  var saveBtn=h("button",{"class":"btn primary",onclick:function(){
    var saved=Object.assign({},form);
    if(md.onSave) md.onSave(saved);
    closeModal();
  }},null);
  var sc=h("span",{style:{lineHeight:"0",display:"inline-flex",alignItems:"center",gap:"4px"}},null);
  sc.innerHTML=SVGS.check; sc.appendChild(document.createTextNode(" Salvar"));
  saveBtn.appendChild(sc); mf.appendChild(saveBtn);

  function field(cfg){
    var wrap=h("div",{"class":"field"+(cfg.full?" full":"")},null);
    var lbl=h("label",null,(cfg.label||"")); wrap.appendChild(lbl);
    var inp;
    if(cfg.options){
      inp=h("select",{onchange:function(){ form[cfg.k]=this.value; if(cfg.onChange) cfg.onChange(this.value); }},
        [h("option",{value:""},"Selecione...")].concat(cfg.options.map(function(o){
          var opt=h("option",{value:o.value||o},o.label||o);
          if((form[cfg.k]||"")===(o.value||o)) opt.selected=true;
          return opt;
        }))
      );
    } else if(cfg.checkbox){
      var cb=h("input",{type:"checkbox"},null);
      cb.checked=!!form[cfg.k];
      cb.addEventListener("change",function(){ form[cfg.k]=this.checked; });
      var lrow=h("div",{style:{display:"flex",alignItems:"center",gap:"7px"}},[cb,h("span",{style:{fontSize:"12px",color:"#374151"}},cfg.label)]);
      wrap.innerHTML=""; wrap.appendChild(lrow); return wrap;
    } else {
      inp=h("input",{type:cfg.type||"text",value:form[cfg.k]||"",oninput:function(){ form[cfg.k]=cfg.type==="number"?+this.value:this.value; }},null);
    }
    wrap.appendChild(inp); return wrap;
  }

  (md.fields||[]).forEach(function(f){ mb.appendChild(field(f)); });
  box.appendChild(mh); box.appendChild(mb); box.appendChild(mf);
  return bg;
}

function pageDash(){
  var fLan=filtEmp(DB.lan);
  var totEnt=fLan.filter(function(l){ return l.tipo==="Entrada"; }).reduce(function(s,l){ return s+l.valor; },0);
  var totSai=fLan.filter(function(l){ return l.tipo==="Saida"; }).reduce(function(s,l){ return s+l.valor; },0);
  var saldo=totEnt-totSai;
  var vencRec=filtEmp(DB.receber).filter(function(r){ return r.status==="Pendente"||r.status==="Vencido"; }).reduce(function(s,r){ return s+r.valor; },0);
  var totAlunos=filtEmp(DB.alunos).filter(function(c){ return c.status==="Ativo"; }).length;
  var alertas=[].concat(
    filtEmp(DB.pagar).filter(function(p){ return p.status==="Vencido"; }).map(function(p){ return {t:"d",msg:"Conta vencida: "+p.desc+" - "+BRL(p.valor),e:p.empId}; }),
    filtEmp(DB.receber).filter(function(r){ return r.status==="Vencido"; }).map(function(r){ return {t:"w",msg:"Mensalidade vencida: "+r.cliente+" - "+BRL(r.valor),e:r.empId}; })
  );

  var page=h("div",{"class":"page"},null);

  // KPIs
  var grid=h("div",{"class":"kpi-grid"},null);
  grid.appendChild(kpiCard("Receita Total",BRL(totEnt),"Margem: "+PCT(totEnt>0?saldo/totEnt:0),"pos"));
  grid.appendChild(kpiCard("Despesas",BRL(totSai),"","neg"));
  grid.appendChild(kpiCard("Saldo Liquido",BRL(saldo),saldo>0?"Positivo":"Negativo",saldo>0?"pos":"neg"));
  grid.appendChild(kpiCard("A Receber",BRL(vencRec),totAlunos+" alunos ativos",""));
  page.appendChild(grid);

  // Alertas
  alertas.slice(0,5).forEach(function(a){
    var row=h("div",{"class":"alert-row "+(a.t==="d"?"alert-d":"alert-w")},null);
    var ic=h("span",{style:{lineHeight:"0",flexShrink:"0"}},null); ic.innerHTML=SVGS.alert; row.appendChild(ic);
    row.appendChild(document.createTextNode(" "+a.msg));
    if(a.e) row.appendChild(empBadge(a.e));
    page.appendChild(row);
  });

  // Gráfico / comparativo
  if(isConsolidado()){
    var comp=EMPRESAS.map(function(e){
      var lE=DB.lan.filter(function(l){ return l.empId===e.id; });
      var r=lE.filter(function(l){ return l.tipo==="Entrada"; }).reduce(function(s,l){ return s+l.valor; },0);
      var d=lE.filter(function(l){ return l.tipo==="Saida"; }).reduce(function(s,l){ return s+l.valor; },0);
      return {e:e,r:r,d:d,s:r-d};
    });
    var maxV=Math.max.apply(null,comp.map(function(c){ return Math.max(c.r,c.d); }))||1;

    var chartSec=h("div",{"class":"sec",style:{marginBottom:"14px"}},null);
    var ch=h("div",{"class":"sec-head"},h("span",{"class":"sec-title"},"Comparativo entre Escolas"));
    var cb=h("div",{"class":"sec-body",style:{padding:"16px 16px 10px"}},null);
    var chartDiv=h("div",{"class":"chart-bar"},null);
    comp.forEach(function(c){
      var rh=Math.round((c.r/maxV)*100);
      var dh=Math.round((c.d/maxV)*100);
      var sh=Math.max(0,Math.round((c.s/maxV)*100));
      var bw=h("div",{"class":"bar-wrap"},null);
      var bars=h("div",{style:{display:"flex",gap:"2px",alignItems:"flex-end",height:"110px"}},null);
      var b1=h("div",{"class":"bar",style:{height:rh+"%",background:"#15803D",flex:"1"}},null);
      var b2=h("div",{"class":"bar",style:{height:dh+"%",background:"#B91C1C",flex:"1"}},null);
      var b3=h("div",{"class":"bar",style:{height:Math.abs(sh)+"%",background:c.s>=0?"#2563EB":"#EF4444",flex:"1"}},null);
      bars.appendChild(b1); bars.appendChild(b2); bars.appendChild(b3);
      bw.appendChild(bars);
      bw.appendChild(h("div",{"class":"bar-lbl",style:{color:c.e.cor,fontWeight:"600"}},c.e.short));
      chartDiv.appendChild(bw);
    });
    cb.appendChild(chartDiv);
    var legend=h("div",{style:{display:"flex",gap:"14px",marginTop:"8px",fontSize:"11px",color:"#64748B"}},null);
    [["#15803D","Receita"],["#B91C1C","Despesa"],["#2563EB","Saldo"]].forEach(function(x){
      var d=h("div",{style:{display:"flex",alignItems:"center",gap:"5px"}},[h("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:x[0]}},null),x[1]]);
      legend.appendChild(d);
    });
    cb.appendChild(legend);
    chartSec.appendChild(ch); chartSec.appendChild(cb);
    page.appendChild(chartSec);

    var cGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"12px"}},null);
    comp.forEach(function(c){
      var card=h("div",{"class":"comp-card",style:{borderColor:c.e.corL}},null);
      var title=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}},[
        h("div",{style:{width:"10px",height:"10px",borderRadius:"50%",background:c.e.cor}}),
        h("strong",{style:{fontSize:"13px",color:"#0F172A"}},c.e.nome)
      ]);
      card.appendChild(title);
      [["Receita",BRL(c.r),"#15803D"],["Despesa",BRL(c.d),"#B91C1C"],["Saldo",BRL(c.s),c.s>=0?"#15803D":"#B91C1C"]].forEach(function(row){
        var r=h("div",{"class":"comp-row"},null);
        r.appendChild(h("span",{"class":"comp-label"},row[0]+":"));
        r.appendChild(h("span",{"class":"comp-val",style:{color:row[2]}},row[1]));
        card.appendChild(r);
      });
      cGrid.appendChild(card);
    });
    page.appendChild(cGrid);
  } else {
    var mesData=MESES.slice(0,MES).map(function(m,i){
      var e2=fLan.filter(function(l){ return l.tipo==="Entrada"&&new Date(l.data).getMonth()===i; }).reduce(function(s,l){ return s+l.valor; },0);
      var s2=fLan.filter(function(l){ return l.tipo==="Saida"&&new Date(l.data).getMonth()===i; }).reduce(function(s,l){ return s+l.valor; },0);
      return {m:m,e:e2,s:s2,sal:e2-s2};
    });
    var maxMV=Math.max.apply(null,mesData.map(function(d){ return Math.max(d.e,d.s); }))||1;
    var mSec=h("div",{"class":"sec",style:{marginBottom:"14px"}},null);
    var mh2=h("div",{"class":"sec-head"},h("span",{"class":"sec-title"},"Receitas vs Despesas Mensais"));
    var mb2=h("div",{"class":"sec-body",style:{padding:"16px 16px 10px"}},null);
    var mChart=h("div",{"class":"chart-bar"},null);
    mesData.forEach(function(d){
      var rh=Math.round((d.e/maxMV)*100);
      var dh=Math.round((d.s/maxMV)*100);
      var bw=h("div",{"class":"bar-wrap"},null);
      var bars=h("div",{style:{display:"flex",gap:"1px",alignItems:"flex-end",height:"100px"}},null);
      bars.appendChild(h("div",{"class":"bar",style:{height:rh+"%",background:"#15803D",flex:"1"}},null));
      bars.appendChild(h("div",{"class":"bar",style:{height:dh+"%",background:"#B91C1C",flex:"1"}},null));
      bw.appendChild(bars);
      bw.appendChild(h("div",{"class":"bar-lbl"},d.m));
      mChart.appendChild(bw);
    });
    mb2.appendChild(mChart);
    mSec.appendChild(mh2); mSec.appendChild(mb2);
    page.appendChild(mSec);
  }
  return page;
}

function pageFinanceiro(){
  var CENTS=["Mensalidades","Matriculas","Atividades Extras","Outras Receitas"];
  var CSAIS=["Salarios Prof","Salarios Adm","Aluguel","Royalties Franquia","Material Didatico","Energia/Agua","Marketing","Impostos","Despesas Fin","Manutencao","Outras Despesas"];
  var search=""; var fTipo="Todos"; var fMes=String(MES);

  function getRows(){
    return DB.lan.filter(function(l){
      var m=new Date(l.data).getMonth()+1;
      return (!isConsolidado()?l.empId===STATE.empId:true)
        &&(fTipo==="Todos"||l.tipo===fTipo)
        &&(fMes==="Todos"||m===parseInt(fMes))
        &&(search===""||l.desc.toLowerCase().includes(search.toLowerCase())||l.cat.toLowerCase().includes(search.toLowerCase()));
    });
  }

  var page=h("div",{"class":"page"},null);

  function rebuild(){
    page.innerHTML="";
    var rows=getRows();
    var totE=rows.filter(function(r){ return r.tipo==="Entrada"; }).reduce(function(s,r){ return s+r.valor; },0);
    var totS=rows.filter(function(r){ return r.tipo==="Saida"; }).reduce(function(s,r){ return s+r.valor; },0);

    var bar=h("div",{"class":"filters"},null);
    var sw=searchInput(search,function(v){ search=v; rebuild(); }); sw.style.flex="1";
    bar.appendChild(sw);
    var selMes=h("select",{onchange:function(){ fMes=this.value; rebuild(); },style:{width:"110px",height:"33px",fontSize:"12px"}},
      [h("option",{value:"Todos"},"Todos meses")].concat(MESES.map(function(m,i){ var o=h("option",{value:String(i+1)},m); if(String(i+1)===fMes) o.selected=true; return o; }))
    ); bar.appendChild(selMes);
    var selTipo=h("select",{onchange:function(){ fTipo=this.value; rebuild(); },style:{width:"90px",height:"33px",fontSize:"12px"}},
      ["Todos","Entrada","Saida"].map(function(o){ var op=h("option",{value:o},o); if(o===fTipo) op.selected=true; return op; })
    ); bar.appendChild(selTipo);
    if(!isConsolidado()){
      var addBtn=h("button",{"class":"btn",onclick:function(){
        openModal({title:"Novo Lancamento",init:{tipo:"Entrada",conc:false,data:today(),empId:STATE.empId},
          fields:[
            {k:"data",label:"Data",type:"date",full:false},{k:"tipo",label:"Tipo",options:["Entrada","Saida"],full:false},
            {k:"desc",label:"Descricao",full:true},
            {k:"cat",label:"Categoria",options:(form_tipo==="Saida"?CSAIS:CENTS),full:true},
            {k:"valor",label:"Valor R$",type:"number"},{k:"obs",label:"Obs"},
            {k:"conc",label:"Conciliado com extrato",checkbox:true,full:true}
          ],
          onSave:async function(d){
      if(!d.empId && STATE.empId!==0) d.empId=STATE.empId;
      await fsAdd("lan",d);
    }
        });
      }},null);
      addBtn.innerHTML=SVGS.plus; addBtn.appendChild(document.createTextNode(" Lancamento"));
      bar.appendChild(addBtn);
    }
    page.appendChild(bar);

    var kg=h("div",{"class":"kpi-grid",style:{gridTemplateColumns:"1fr 1fr 1fr"}},null);
    kg.appendChild(kpiCard("Receitas",BRL(totE),"","pos"));
    kg.appendChild(kpiCard("Despesas",BRL(totS),"","neg"));
    kg.appendChild(kpiCard("Saldo",BRL(totE-totS),"",totE-totS>=0?"pos":"neg"));
    page.appendChild(kg);

    var cols=[
      {k:"data",label:"Data",r:false,render:DT},
      {k:"desc",label:"Descricao"},
      {k:"cat",label:"Categoria"},
      {k:"tipo",label:"Tipo",render:function(v){ return badge(v); }},
      {k:"valor",label:"Valor",r:true,render:function(v,row){ var s=document.createElement("span"); s.style.fontWeight="700"; s.style.color=row.tipo==="Entrada"?"#15803D":"#B91C1C"; s.textContent=BRL(v); return s; }},
      {k:"conc",label:"Conc.",render:function(v){ var s=document.createElement("span"); s.style.lineHeight="0"; s.innerHTML=v?SVGS.check:SVGS.clock; s.style.color=v?"#15803D":"#CBD5E1"; return s; }},
    ];
    page.appendChild(secWrap("Lancamentos ("+rows.length+")",
      h("span",{style:{fontSize:"11px",color:"#94A3B8"}},rows.filter(function(r){ return !r.conc; }).length+" nao conciliados"),
      tableWrap(cols,rows,isConsolidado(),
        !isConsolidado()?function(row){ openModal({title:"Editar",init:row,fields:[{k:"data",label:"Data",type:"date"},{k:"tipo",label:"Tipo",options:["Entrada","Saida"]},{k:"desc",label:"Descricao",full:true},{k:"cat",label:"Categoria",options:CENTS.concat(CSAIS),full:true},{k:"valor",label:"Valor R$",type:"number"},{k:"conc",label:"Conciliado",checkbox:true,full:true}],onSave:async function(d){
      if(!d.empId && STATE.empId!==0) d.empId=STATE.empId;
      await fsSet("lan",d);
    }}); }:null,
        !isConsolidado()?function(id){ upd("lan",function(arr){ return arr.filter(function(x){ return x.id!==id; }); }); }:null
      )
    ));
  }
  rebuild(); return page;
}

render = function() {

// ─── OVERRIDE CRUD IN PAGES TO USE FIREBASE ───────────────────────────────────
// All pages that call upd() need to use saveItem/fsDel instead
// We patch this by overriding the modal onSave and onDel callbacks

var _origOpenModal = openModal;
openModal = function(data) {
  if (data.onSave) {
    var origSave = data.onSave;
    data.onSave = async function(d) {
      if (!d.empId && STATE.empId !== 0) d.empId = STATE.empId;
      await saveItem(data._collection || "lan", d);
    };
    data._origSave = origSave;
  }
  STATE.modalData = data;
  render();
};

// ─── FIREBASE AUTH LISTENER ───────────────────────────────────────────────────
FA.onAuthStateChanged(async function(fbUser) {
  if (fbUser) {
    STATE.loading = true; render();
    try {
      var profDoc = await FS.collection("usuarios").doc(fbUser.uid).get();
      if (profDoc.exists) {
        STATE.user = Object.assign({uid:fbUser.uid}, profDoc.data());
        STATE.empId = STATE.user.role==="admin" ? 0 : (STATE.user.empId || 1);
        await loadAll();
      }
    } catch(e) { console.error("Load error:", e); }
    STATE.loading = false; STATE.mod = "dash"; render();
  } else {
    STATE.loading = false;
    await checkFirstSetup();
  }
});
