<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;font-size:13px;background:#F1F5F9;color:#111;overflow:hidden}
input,select,textarea{height:36px;padding:0 10px;border:1px solid #D1D5DB;border-radius:7px;font-size:12px;width:100%;background:#fff;color:#111;outline:none;font-family:inherit}
input:focus,select:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.12)}
textarea{height:72px;padding:8px 10px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#0F172A;display:flex;flex-direction:column;transition:width .2s;overflow:hidden}
.sidebar.closed{width:48px;min-width:48px}
.sb-logo{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.sb-logo-title{color:#F1F5F9;font-weight:700;font-size:12px;white-space:nowrap}
.sb-logo-sub{color:#475569;font-size:9px}
.sb-section{padding:6px 10px 3px;font-size:9px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.sb-nav{padding:4px 6px;flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:1px;transition:background .12s}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.active{background:rgba(255,255,255,.1)}
.sb-item-label{font-size:11px;color:#9CA3AF;white-space:nowrap;font-weight:400}
.sb-item.active .sb-item-label{color:#F1F5F9;font-weight:600}
.sb-badge{background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:auto;flex-shrink:0}
.sb-unit{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-unit-lbl{font-size:9px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sb-unit-item{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:5px;cursor:pointer}
.sb-unit-item:hover,.sb-unit-item.active{background:rgba(255,255,255,.1)}
.sb-unit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-unit-name{font-size:10px;color:#64748B;white-space:nowrap}
.sb-unit-item.active .sb-unit-name{color:#F1F5F9;font-weight:600}
.sb-user{padding:9px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-user-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;background:rgba(255,255,255,.05)}
.sb-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sb-name{flex:1;font-size:10px;font-weight:500;color:#E2E8F0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-role{font-size:9px;color:#475569}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 16px;height:46px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:700;color:#0F172A}
.topbar-right{display:flex;align-items:center;gap:8px}
.emp-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.page{flex:1;overflow:auto;padding:14px}

/* Cards KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:13px 15px;position:relative}
.kpi-label{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.kpi-val{font-size:20px;font-weight:700;color:#0F172A;line-height:1.2}
.kpi-sub{font-size:10px;color:#94A3B8;margin-top:2px}
.kpi-sub.up{color:#15803D}
.kpi-sub.dn{color:#B91C1C}
.kpi-icon{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}

/* Sections */
.sec{background:#fff;border:1px solid #E2E8F0;border-radius:10px;margin-bottom:12px;overflow:hidden}
.sec-head{padding:10px 14px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.sec-title{font-size:13px;font-weight:600;color:#0F172A}
.sec-body{overflow-x:auto}
.sec-pad{padding:14px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#F8FAFC;border-bottom:1.5px solid #E2E8F0}
th{padding:7px 11px;text-align:left;color:#94A3B8;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
th.r{text-align:right}
td{padding:7px 11px;border-bottom:1px solid #F8FAFC;color:#1E293B;vertical-align:middle}
td.r{text-align:right}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFAFA}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1px solid #E2E8F0;background:#fff;color:#374151;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn:hover{background:#F8FAFC}
.btn.primary{background:#0F172A;color:#fff;border-color:#0F172A}
.btn.primary:hover{background:#1E293B}
.btn.success{background:#15803D;color:#fff;border-color:#15803D}
.btn.danger{background:#FEF2F2;color:#B91C1C;border-color:#FCA5A5}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.xs{padding:2px 7px;font-size:10px}

/* Filters bar */
.fbar{display:flex;gap:7px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.fbar input,.fbar select{height:32px;font-size:12px}
.ftab{padding:3px 11px;border-radius:14px;border:1px solid #E2E8F0;background:#fff;color:#64748B;font-size:11px;cursor:pointer;font-weight:400;transition:all .12s}
.ftab:hover{background:#F8FAFC}
.ftab.on{font-weight:600}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#CBD5E1}
.search-wrap input{padding-left:28px;height:32px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-head{padding:13px 18px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;flex-shrink:0}
.modal-head h3{margin:0;font-size:13px;font-weight:700;color:#0F172A}
.modal-body{padding:16px 18px;flex:1}
.modal-foot{padding:10px 18px 14px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #F1F5F9;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
.field label{display:block;font-size:10px;font-weight:600;color:#374151;margin-bottom:3px}

/* Alerts */
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;margin-bottom:5px;font-size:11px}

/* Login */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0F172A;padding:16px}
.login-box{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:420px}
.user-card{display:flex;align-items:center;gap:10px;padding:7px 11px;border-radius:8px;cursor:pointer;border:1.5px solid #E2E8F0;margin-bottom:5px;transition:all .12s}
.user-card:hover{background:#F8FAFC}

/* Charts */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:130px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-seg{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.bar-lbl{font-size:9px;color:#94A3B8;white-space:nowrap}
.bar-val{font-size:9px;color:#64748B}

/* Progress bars */
.prog-bar{background:#F1F5F9;border-radius:3px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* Tabs */
.tab-row{display:flex;border-bottom:1px solid #E2E8F0;margin-bottom:14px}
.tab-item{padding:8px 14px;font-size:12px;color:#64748B;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab-item:hover{color:#374151}
.tab-item.on{color:#2563EB;border-bottom-color:#2563EB;font-weight:600}

/* Lote buttons */
.lote-bar{display:flex;gap:6px;padding:8px 14px;background:#F8FAFC;border-bottom:1px solid #F1F5F9;align-items:center;flex-wrap:wrap}

@media(max-width:640px){
  .sidebar{width:48px;min-width:48px}
  .sb-logo-title,.sb-logo-sub,.sb-unit,.sb-item-label,.sb-badge,.sb-name,.sb-role{display:none}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
}

/* DARK MODE */

body.dark .modal-foot{border-color:#334155}
body.dark .login-box{background:#1E293B}
body.dark .user-card{border-color:#334155;background:#0F172A}
body.dark .user-card:hover{background:#334155}
body.dark .tab-item{color:#64748B}
body.dark .tab-item.on{color:#60A5FA;border-bottom-color:#60A5FA}

body.dark .ftab{background:#1E293B;border-color:#334155;color:#94A3B8}
body.dark .topbar-title{color:#F1F5F9}
body.dark .sb-item-label{color:#9CA3AF}
body.dark .sb-item.active .sb-item-label{color:#F1F5F9}

</style>

var $ = function(s,c){ return (c||document).querySelector(s); };
var $$ = function(s,c){ return Array.from((c||document).querySelectorAll(s)); };
var h = function(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="class") el.className=attrs[k];
    else if(k==="style"&&typeof attrs[k]==="object") Object.assign(el.style,attrs[k]);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else el.setAttribute(k,attrs[k]);
  });
  if(children!=null) [].concat(children).forEach(function(c){
    if(c==null||c===false||c===undefined) return;
    try {
      if(typeof c==="string"||typeof c==="number"||typeof c==="boolean") {
        el.appendChild(document.createTextNode(String(c)));
      } else if(c instanceof Node) {
        el.appendChild(c);
      } else {
        el.appendChild(document.createTextNode(String(c)));
      }
    } catch(e) { console.warn("appendChild error:", e, c); }
  });

};
var zp = function(n){ return String(n).padStart(2,"0"); };
var BRL = function(v){ return "R$ "+((+v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})); };
var PCT = function(v){ return (((+v||0)*100).toFixed(1))+"%"; };
var DT = function(s){ try{var p=s.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:s;}catch(e){return s||"";} };
var today = function(){ var d=new Date(); return d.getFullYear()+"-"+zp(d.getMonth()+1)+"-"+zp(d.getDate()); };
var addDias = function(n){ var d=new Date(Date.now()+n*864e5); return d.getFullYear()+"-"+zp(d.getMonth()+1)+"-"+zp(d.getDate()); };
var NOW=new Date(); var ANO=NOW.getFullYear(); var MES=NOW.getMonth()+1;
var MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
var EMPRESAS_DEFAULT=[

var EMPRESAS=loadEmpresas();

  operacional:{label:"Operacional",  cor:"#15803D",bg:"#DCFCE7",mods:["alunos","cursos","clientes"]},

var CATS_RECEBER=["Mensalidades","Matriculas","Material Didatico","Atividades Extras","Renegociacao","Outras Receitas"];

// Custom users managed by admin
function loadCustomUsers(){ try{ var s=localStorage.getItem("erp_usuarios"); return s?JSON.parse(s):[]; }catch(e){ return []; } }
function saveCustomUsers(arr){ localStorage.setItem("erp_usuarios",JSON.stringify(arr)); }
var CUSTOM_USERS = loadCustomUsers();

// Get profile for any email (check PROF_MAP then CUSTOM_USERS)
function getProfile(email){
  if(PROF_MAP[email]) return PROF_MAP[email];
  var cu = CUSTOM_USERS.find(function(u){ return u.email===email; });
  return cu ? {nome:cu.nome, role:cu.role, empId:cu.empId, av:cu.av} : null;
}

// ── STATE & DATA ──────────────────────────────────────────────────────────────
var STATE={user:null,empId:null,mod:"dash",modal:null,loteSelected:{}};
var DB=null;
var _dbReady=false;
var _dbUnsubscribe=null;

function loadFromLocalStorage(){
  try{ var s=localStorage.getItem("erp_v6"); var p=s?JSON.parse(s):null; return (p&&p.pagar)?p:null; }catch(e){ return null; }
}

function saveDB(){
  try{ localStorage.setItem("erp_v6",JSON.stringify(DB)); }catch(e){}
  if(STATE.user){
    try{ DB_REF.set(JSON.parse(JSON.stringify(DB))).catch(function(e){ console.warn("Firestore sync error:",e.code); }); }catch(e){}
  }
}

function iniciarListenerDB(){
  if(_dbUnsubscribe) return;

  // 1) Carrega localStorage imediatamente — app ja funciona
  var local=loadFromLocalStorage();
  DB=local||seedDB();
  if(!local){ try{ localStorage.setItem("erp_v6",JSON.stringify(DB)); }catch(e){} }
  _dbReady=true;
  render();

  // 2) Tenta conectar Firestore em background (nao bloqueia)
  var fsTimeout=setTimeout(function(){
    console.warn("Firestore timeout — usando localStorage");
  },8000);

  try{
    _dbUnsubscribe=DB_REF.onSnapshot(function(doc){
      clearTimeout(fsTimeout);
      if(doc.exists){
        var fsData=doc.data();
        // So substitui se o Firestore tiver dados mais recentes (mais registros)
        var fsTotal=(fsData.pagar||[]).length+(fsData.alunos||[]).length+(fsData.clientes||[]).length;
        var lcTotal=(DB.pagar||[]).length+(DB.alunos||[]).length+(DB.clientes||[]).length;
        if(fsTotal>=lcTotal){
          DB=fsData;
          try{ localStorage.setItem("erp_v6",JSON.stringify(DB)); }catch(e){}
          render();
        }
      } else {
        // Primeiro acesso: sobe localStorage para o Firestore
        DB_REF.set(JSON.parse(JSON.stringify(DB))).catch(function(e){ console.warn("Firestore set error:",e.code); });
      }
    }, function(err){
      clearTimeout(fsTimeout);
      console.warn("Firestore indisponivel ("+err.code+") — usando localStorage");
    });
  }catch(e){
    clearTimeout(fsTimeout);
    console.warn("Firestore erro ao conectar:",e);
  }
}

function pararListenerDB(){
  if(_dbUnsubscribe){ try{ _dbUnsubscribe(); }catch(e){} _dbUnsubscribe=null; }
  _dbReady=false;
  DB=null;
}

function maxId(arr){ return arr&&arr.length>0?Math.max.apply(null,arr.map(function(x){return +x.id||0;})):0; }
function fEmp(arr){ return STATE.empId===0?arr:(arr||[]).filter(function(x){return x.empId===STATE.empId;}); }
function canEdit(){ return !isConsolidado(); }

function isConsolidado(){ return STATE.empId===0; }

function badge(status,custom){
  var COLOR_MAP={
    "Ativo":["#15803D","#DCFCE7"],"Inativo":["#64748B","#F1F5F9"],
    "Pago":["#15803D","#DCFCE7"],"Recebido":["#15803D","#DCFCE7"],
    "Pendente":["#B45309","#FEF3C7"],"Vencido":["#B91C1C","#FEE2E2"],
    "Cancelado":["#64748B","#F1F5F9"],"Entrada":["#15803D","#DCFCE7"],
    "Saida":["#B91C1C","#FEE2E2"],"Ativo":["#15803D","#DCFCE7"],
    "Em Dia":["#15803D","#DCFCE7"],"Inadimplente":["#B91C1C","#FEE2E2"],
  };
  var c=custom||(COLOR_MAP[status]||["#64748B","#F1F5F9"]);
  var sp=document.createElement("span");
  sp.className="badge";
  sp.style.color=c[0]; sp.style.background=c[1];
  sp.textContent=status||""; return sp;
}
function empBadge(empId){
  var e=EMPRESAS.find(function(x){return x.id===empId;});
  if(!e) return document.createTextNode("");
  var sp=document.createElement("span");
  sp.className="badge"; sp.style.color=e.cor; sp.style.background=e.corL;
  sp.textContent=e.short; return sp;
}

// ── SECTION WRAPPER ───────────────────────────────────────────────────────────
function sec(title,actions,body,pad){
  var el=h("div",{"class":"sec"},null);
  var head=h("div",{"class":"sec-head"},null);
  head.appendChild(h("span",{"class":"sec-title"},title));
  var actDiv=h("div",{style:{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}},null);
  if(actions)[].concat(actions).forEach(function(a){if(a) actDiv.appendChild(a);});
  head.appendChild(actDiv);
  el.appendChild(head);
  var bodyWrap=h("div",{"class":pad?"sec-pad":"sec-body"},null);
  if(body)[].concat(body).forEach(function(b){if(b) bodyWrap.appendChild(typeof b==="string"?document.createTextNode(b):b);});
  el.appendChild(bodyWrap);
  return el;
}

// ── TABLE BUILDER ─────────────────────────────────────────────────────────────
function tbl(cols,rows,opts){
  opts=opts||{};
  var showEmp=opts.showEmp; var onEdit=opts.onEdit; var onDel=opts.onDel; var onPag=opts.onPag; var onRec=opts.onRec; var onSel=opts.onSel;
  var table=h("table",null,null);
  var thead=h("thead",null,null);
  var htr=h("tr",null,null);
  if(onSel) htr.appendChild(h("th",{style:{width:"30px"}},null));
  if(showEmp) htr.appendChild(h("th",null,"Escola"));
  cols.forEach(function(c){ htr.appendChild(h("th",{"class":c.r?"r":"",style:{width:c.w||"auto",whiteSpace:"nowrap"}},c.label)); });
  if(onEdit||onDel||onPag||onRec) htr.appendChild(h("th",{style:{width:"90px"}},null));
  thead.appendChild(htr); table.appendChild(thead);
  var tbody=h("tbody",null,null);
  if(!rows||rows.length===0){
    var etr=h("tr",null,null);
    etr.appendChild(h("td",{colspan:"20",style:{textAlign:"center",color:"#CBD5E1",padding:"24px"}},"Nenhum registro"));
    tbody.appendChild(etr);
  }
  rows.forEach(function(row,i){
    var tr=h("tr",null,null);
    if(onSel){
      var chk=h("input",{type:"checkbox"},null);
      chk.checked=!!STATE.loteSelected[row.id];
      chk.addEventListener("change",function(){ STATE.loteSelected[row.id]=chk.checked; });
      var td=h("td",null,null); td.appendChild(chk); tr.appendChild(td);
    }
    if(showEmp){ var etd=h("td",null,null); etd.appendChild(empBadge(row.empId)); tr.appendChild(etd); }
    cols.forEach(function(c){
      var td=h("td",{"class":c.r?"r":"",style:{whiteSpace:c.nowrap?"nowrap":"normal",maxWidth:c.maxw||"none",overflow:"hidden",textOverflow:"ellipsis"}},null);
      var val=row[c.k];
      if(c.render){ var r=c.render(val,row); if(r instanceof Node) td.appendChild(r); else td.textContent=r||""; }
      else td.textContent=val==null?"":val;
      tr.appendChild(td);
    });
    if(onEdit||onDel||onPag||onRec){

// ── CSV EXPORT ────────────────────────────────────────────────────────────────
function exportCSV(filename,rows){
  if(!rows||!rows.length) return alert("Nenhum dado para exportar.");
  var keys=Object.keys(rows[0]);
  var csv=[keys.join(";")].concat(rows.map(function(r){return keys.map(function(k){var v=r[k]||"";return typeof v==="string"&&v.includes(";")?'"'+v+'"':v;}).join(";")})).join("\n");
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=filename; a.click();
}

// ── IMPORT CSV ────────────────────────────────────────────────────────────────
function importCSV(onData){
  var inp=document.createElement("input");
  inp.type="file"; inp.accept=".csv";
  inp.onchange=function(){
    var file=inp.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      var lines=e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
      if(lines.length<2) return alert("Arquivo vazio ou invalido.");
      var headers=lines[0].split(";");
      var rows=lines.slice(1).map(function(line){
        var vals=line.split(";");
        var obj={};
        headers.forEach(function(h2,i){obj[h2.trim()]=vals[i]?vals[i].trim():"";});
        return obj;
      });
      onData(rows);
    };
    reader.readAsText(file,"UTF-8");
  };
  inp.click();
}

        errMsg.style.display="none";
        var email=emailInp.value.trim();
        var pwd=pwdInp.value;
        if(!email){errMsg.textContent="Digite o email";errMsg.style.display="block";return;}
        if(!pwd){errMsg.textContent="Digite a senha";errMsg.style.display="block";return;}
        loginBtn.disabled=true; loginBtn.textContent="Entrando...";
        FA.signInWithEmailAndPassword(email,pwd).catch(function(e){
          loginBtn.disabled=false; loginBtn.innerHTML=S.login; loginBtn.appendChild(document.createTextNode(" Entrar"));
          var msg="Email ou senha incorretos";
          if(e.code==="auth/too-many-requests") msg="Muitas tentativas. Aguarde alguns minutos";
          if(e.code==="auth/network-request-failed") msg="Erro de rede";
          if(e.code==="auth/unauthorized-domain") msg="Dominio nao autorizado no Firebase";
          if(e.code==="auth/user-not-found"||e.code==="auth/invalid-credential") msg="Email nao cadastrado ou senha incorreta";
          errMsg.textContent=msg; errMsg.style.display="block";
        });
      }},null);
      loginBtn.innerHTML=S.login; loginBtn.appendChild(document.createTextNode(" Entrar"));
      pwdInp.addEventListener("keydown",function(e){if(e.key==="Enter")loginBtn.click();});
      emailInp.addEventListener("keydown",function(e){if(e.key==="Enter")pwdInp.focus();});
      box.appendChild(errMsg); box.appendChild(loginBtn);

      // Switch to cards
      var switchBtn=h("button",{style:{width:"100%",padding:"7px",marginTop:"8px",borderRadius:"8px",background:"none",border:"1px solid #E2E8F0",color:"#64748B",fontSize:"11px",cursor:"pointer"},onclick:function(){loginMode="cards";buildBox();}},null);
      switchBtn.appendChild(document.createTextNode("Ver lista de usuarios ›"));
      box.appendChild(switchBtn);
      box.appendChild(h("p",{style:{textAlign:"center",fontSize:"9px",color:"#CBD5E1",marginTop:"8px"}},"Dados salvos no Firebase - acesse de qualquer dispositivo"));

    } else {
      // ── LISTA DE USUARIOS (cards) ──────────────────────────────────────────
      var allUsers = [
        {nome:"Admin Franquia",      email:"admin@franquia.com",   role:"admin",      empId:null,av:"AF",cor:"#B91C1C"},
        {nome:"Carlos - Dir. Alfa",  email:"dir.alfa@escola.com",  role:"diretor",    empId:1,  av:"CS",cor:"#2563EB"},
        {nome:"Fernanda - Dir. Beta",email:"dir.beta@escola.com",  role:"diretor",    empId:2,  av:"FR",cor:"#15803D"},
        {nome:"Marcos - Dir. Gama",  email:"dir.gama@escola.com",  role:"diretor",    empId:3,  av:"MO",cor:"#6D28D9"},
        {nome:"Juliana - Fin. Alfa", email:"fin.alfa@escola.com",  role:"financeiro", empId:1,  av:"JF",cor:"#C2410C"},
        {nome:"Roberto - Op. Beta",  email:"op.beta@escola.com",   role:"operacional",empId:2,  av:"RO",cor:"#0F766E"},
      ].concat(CUSTOM_USERS.map(function(u){ return Object.assign({},u,{cor:ROLES[u.role]?ROLES[u.role].cor:"#374151"}); }));

      box.appendChild(h("p",{style:{fontSize:"10px",fontWeight:"600",color:"#374151",margin:"0 0 7px",textTransform:"uppercase",letterSpacing:".5px"}},"Selecione o usuario"));
      var selUser=null;
      var cards=h("div",{style:{maxHeight:"260px",overflowY:"auto"}},null);
      allUsers.forEach(function(u){
        var rc=ROLES[u.role]||{bg:"#F1F5F9",cor:"#374151",label:u.role};
        var card=h("div",{"class":"user-card",onclick:function(){
          cards.querySelectorAll(".user-card").forEach(function(c2){c2.style.borderColor="#E2E8F0";c2.style.background="";});
          card.style.borderColor=u.cor; card.style.background=u.cor+"08";
          selUser=u; pwdInp2.placeholder="Senha"; pwdInp2.value=""; pwdInp2.focus();
        }},[
          h("div",{style:{width:"26px",height:"26px",borderRadius:"50%",background:u.cor+"20",display:"flex",alignItems:"center",justifyContent:"center",color:u.cor,fontSize:"10px",fontWeight:"700",flexShrink:"0"}},u.av),
          h("div",{style:{flex:"1"}},[h("p",{style:{margin:"0",fontSize:"12px",fontWeight:"500",color:"#0F172A"}},u.nome),h("p",{style:{margin:"0",fontSize:"10px",color:"#94A3B8"}},u.email)]),
          h("span",{style:{background:rc.bg||"#F1F5F9",color:rc.cor||"#374151",fontSize:"9px",fontWeight:"600",padding:"2px 6px",borderRadius:"10px"}},rc.label||u.role)
        ]);
        cards.appendChild(card);
      });
      box.appendChild(cards);

      var pwdWrap2=h("div",{style:{position:"relative",margin:"10px 0 6px"}},null);
      var pwdInp2=h("input",{type:"password",placeholder:"Selecione um usuario acima",style:{paddingRight:"36px",margin:"0",width:"100%"}},null);
      var eyeBtn2=h("button",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",lineHeight:"0",color:"#94A3B8",padding:"4px"},onclick:function(){
        pwdInp2.type=pwdInp2.type==="password"?"text":"password";
        eyeBtn2.innerHTML=pwdInp2.type==="password"?S.eye:S.eyeoff;
      }},null);
      eyeBtn2.innerHTML=S.eye;
      pwdWrap2.appendChild(pwdInp2); pwdWrap2.appendChild(eyeBtn2); box.appendChild(pwdWrap2);

      var errMsg2=h("p",{style:{color:"#B91C1C",fontSize:"11px",marginBottom:"6px",display:"none"}},"");
      var loginBtn2=h("button",{style:{width:"100%",padding:"10px",borderRadius:"8px",background:"#0F172A",color:"#fff",fontSize:"13px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},onclick:function(){
        errMsg2.style.display="none";
        if(!selUser){errMsg2.textContent="Selecione um usuario";errMsg2.style.display="block";return;}
        if(!pwdInp2.value){errMsg2.textContent="Digite a senha";errMsg2.style.display="block";return;}
        loginBtn2.disabled=true; loginBtn2.textContent="Entrando...";
        FA.signInWithEmailAndPassword(selUser.email,pwdInp2.value).catch(function(e){
          loginBtn2.disabled=false; loginBtn2.innerHTML=S.login; loginBtn2.appendChild(document.createTextNode(" Entrar"));
          var msg="Email ou senha incorretos";
          if(e.code==="auth/too-many-requests") msg="Muitas tentativas. Aguarde alguns minutos";
          errMsg2.textContent=msg; errMsg2.style.display="block";
        });
      }},null);
      loginBtn2.innerHTML=S.login; loginBtn2.appendChild(document.createTextNode(" Entrar"));
      pwdInp2.addEventListener("keydown",function(e){if(e.key==="Enter")loginBtn2.click();});

      box.appendChild(errMsg2); box.appendChild(loginBtn2);
      var switchBtn2=h("button",{style:{width:"100%",padding:"7px",marginTop:"8px",borderRadius:"8px",background:"none",border:"1px solid #E2E8F0",color:"#64748B",fontSize:"11px",cursor:"pointer"},onclick:function(){loginMode="email";buildBox();}},null);
      switchBtn2.appendChild(document.createTextNode("Entrar com email ›"));
      box.appendChild(switchBtn2);
    }
  }

  buildBox();
  return bg;
}



// ── FIREBASE AUTH ─────────────────────────────────────────────────────────────
var _fbReady=true;
FA.onAuthStateChanged(function(fbUser){
  _fbReady=true;
  if(fbUser){
    var p=getProfile(fbUser.email)||{nome:fbUser.email.split("@")[0],role:"operacional",empId:1,av:fbUser.email.substring(0,2).toUpperCase()};
    STATE.user=Object.assign({uid:fbUser.uid,email:fbUser.email},p);
    STATE.empId=STATE.user.role==="admin"?0:(STATE.user.empId||1);
    STATE.mod="dash";
    iniciarListenerDB(); // inicia listener DEPOIS do login — Firestore vai aceitar
  } else {
    pararListenerDB();
    STATE.user=null; STATE.empId=null;
    render();
  }
});

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById("app");
  if(!root) return;
  root.innerHTML="";

  if(!_fbReady){
    root.appendChild(h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0F172A"}},
      h("div",{style:{textAlign:"center",color:"#94A3B8",fontSize:"14px"}},"Carregando...")
    ));
    return;
  }

  if(!STATE.user){ root.appendChild(renderLogin()); return; }

  var modal=buildModal();

  var perm=ROLES[STATE.user.role]?ROLES[STATE.user.role].mods:[];
  var empresa=STATE.empId===0?FRANQUIA:(EMPRESAS.find(function(e){return e.id===STATE.empId;})||FRANQUIA);
  var u=STATE.user; var rc=ROLES[u.role]||{};

  var ALL_NAV=[
    {id:"dash",    label:"Dashboard",            icn:"dash",   cor:"#2563EB"},
    {id:"pagar",   label:"Contas a Pagar",        icn:"pagar",  cor:"#B91C1C"},
    {id:"receber", label:"Contas a Receber",       icn:"receber",cor:"#0F766E"},
    {id:"clientes",label:"Clientes e Fornecedores",icn:"clientes",cor:"#6D28D9"},
    {id:"fluxo",   label:"Movimentacao de Caixa",  icn:"fluxo",  cor:"#0284C7"},
    {id:"alunos",  label:"Alunos",                 icn:"alunos", cor:"#C2410C"},
    {id:"cursos",  label:"Cursos e Produtos",       icn:"cursos", cor:"#0F766E"},
    {id:"rel",     label:"Relatorios",              icn:"rel",    cor:"#1E3A5F"},
    {id:"config",  label:"Configuracoes",           icn:"config", cor:"#374151"},
  ];
  var nav=ALL_NAV.filter(function(n){return perm.indexOf(n.id)>=0;});

  var alertCount=fEmp(DB.pagar).filter(function(p){return p.status==="Vencido";}).length+fEmp(DB.receber).filter(function(r){return r.status==="Vencido";}).length;

  // Sidebar
  var aside=h("aside",{"class":"sidebar"},null);
  var logo=h("div",{"class":"sb-logo",onclick:function(){aside.classList.toggle("closed");}},null);
  var mc=h("span",{style:{lineHeight:"0",color:"#94A3B8",flexShrink:"0"}},null); mc.innerHTML=S.menu; logo.appendChild(mc);
  logo.appendChild(h("div",null,[h("div",{"class":"sb-logo-title"},"ERP Franquia"),h("div",{"class":"sb-logo-sub"},"Rede de Ensino - "+ANO)]));
  aside.appendChild(logo);

  if(u.role==="admin"){
    var sbU=h("div",{"class":"sb-unit"},null);
    sbU.appendChild(h("div",{"class":"sb-unit-lbl"},"Unidade"));
    [FRANQUIA].concat(EMPRESAS).forEach(function(e){
      var item=h("div",{"class":"sb-unit-item"+(STATE.empId===e.id?" active":""),onclick:function(){STATE.empId=e.id;STATE.mod="dash";render();}},null);
      item.appendChild(h("div",{"class":"sb-unit-dot",style:{background:e.cor}},null));
      item.appendChild(h("span",{"class":"sb-unit-name"},e.nome));
      sbU.appendChild(item);
    });
    aside.appendChild(sbU);
  }

  var navDiv=h("div",{"class":"sb-nav"},null);
  nav.forEach(function(n){
    var active=STATE.mod===n.id;
    var item=h("div",{"class":"sb-item"+(active?" active":""),onclick:function(){STATE.mod=n.id;render();}},null);
    var ic2=h("span",{style:{lineHeight:"0",color:active?n.cor:"#4B5563",flexShrink:"0"}},null); ic2.innerHTML=S[n.icn]||S.dash; item.appendChild(ic2);
    item.appendChild(h("span",{"class":"sb-item-label"},n.label));
    if(n.id==="dash"&&alertCount>0) item.appendChild(h("span",{"class":"sb-badge"},String(alertCount)));
    navDiv.appendChild(item);
  });
  aside.appendChild(navDiv);

  var sbUsr=h("div",{"class":"sb-user"},null);
  var uRow=h("div",{"class":"sb-user-row"},null);
  uRow.appendChild(h("div",{"class":"sb-avatar",style:{background:rc.bg||"#eee",color:rc.cor||"#333"}},u.av||"?"));
  uRow.appendChild(h("div",{style:{flex:"1",minWidth:"0"}},[h("div",{"class":"sb-name"},u.nome||""),h("div",{"class":"sb-role"},rc.label||u.role)]));
  var logBtn=h("button",{style:{color:"#475569",lineHeight:"0",padding:"3px"},onclick:function(){FA.signOut();},title:"Sair"},null);
  logBtn.innerHTML=S.logout; uRow.appendChild(logBtn); sbUsr.appendChild(uRow); aside.appendChild(sbUsr);

  // Main
  var main=h("div",{"class":"main"},null);
  var topbar=h("div",{"class":"topbar"},null);
  var tLeft=h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},null);
  tLeft.appendChild(h("span",{"class":"topbar-title"},(nav.find(function(n){return n.id===STATE.mod;})||{label:""}).label));
  tLeft.appendChild(h("span",{"class":"emp-pill",style:{color:empresa.cor,background:empresa.corL}},empresa.nome));
  topbar.appendChild(tLeft);
  var darkBtn=h("button",{"class":"btn sm",style:{padding:"4px 8px",lineHeight:"0",display:"inline-flex",alignItems:"center",gap:"4px"},title:"Modo noturno",onclick:function(){
    document.body.classList.toggle("dark");
    localStorage.setItem("erp_dark",document.body.classList.contains("dark")?"1":"0");
    darkBtn.innerHTML=document.body.classList.contains("dark")?S.sun:S.moon;
  }},null);
  var isDark=localStorage.getItem("erp_dark")==="1";
  if(isDark) document.body.classList.add("dark");
  darkBtn.innerHTML=isDark?S.sun:S.moon;
  var tRight=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[
    h("span",{style:{fontSize:"10px",color:"#CBD5E1"}},new Date().toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short"})),
    darkBtn
  ]);
  topbar.appendChild(tRight);
  main.appendChild(topbar);

  var PAGES={dash:pageDash,pagar:pagePagar,receber:pageReceber,clientes:pageClientes,fluxo:pageFluxo,alunos:pageAlunos,cursos:pageCursos,rel:pageRel,config:pageConfig};
  main.appendChild((PAGES[STATE.mod]||pageDash)());

  var app2=h("div",{"class":"app"},null);
  app2.appendChild(aside); app2.appendChild(main);
  root.appendChild(app2);
  if(modal) root.appendChild(modal);
}

render();
</script>
</body>
