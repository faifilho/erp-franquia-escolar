<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;font-size:13px;background:#F1F5F9;color:#111;overflow:hidden}
input,select,textarea{height:36px;padding:0 10px;border:1px solid #D1D5DB;border-radius:7px;font-size:12px;width:100%;background:#fff;color:#111;outline:none;font-family:inherit}
input:focus,select:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.12)}
textarea{height:72px;padding:8px 10px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:#0F172A;display:flex;flex-direction:column;transition:width .2s;overflow:hidden}
.sidebar.closed{width:48px;min-width:48px}
.sb-logo{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.sb-logo-title{color:#F1F5F9;font-weight:700;font-size:12px;white-space:nowrap}
.sb-logo-sub{color:#475569;font-size:9px;white-space:nowrap}
.sb-nav{padding:4px 6px;flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:1px;transition:background .12s}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.active{background:rgba(255,255,255,.1)}
.sb-item-label{font-size:11px;color:#9CA3AF;white-space:nowrap;font-weight:400}
.sb-item.active .sb-item-label{color:#F1F5F9;font-weight:600}
.sb-badge{background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:auto;flex-shrink:0}
.sb-user{padding:9px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-user-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;background:rgba(255,255,255,.05)}
.sb-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sb-name{flex:1;font-size:10px;font-weight:500;color:#E2E8F0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-role{font-size:9px;color:#475569}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 16px;height:46px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:700;color:#0F172A}
.page{flex:1;overflow:auto;padding:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:13px 15px;position:relative}
.kpi-label{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.kpi-val{font-size:20px;font-weight:700;color:#0F172A;line-height:1.2}
.kpi-sub{font-size:10px;color:#94A3B8;margin-top:2px}

.kpi-sub.dn{color:#B91C1C}
.kpi-icon{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.sec{background:#fff;border:1px solid #E2E8F0;border-radius:10px;margin-bottom:12px;overflow:hidden}
.sec-head{padding:10px 14px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.sec-title{font-size:13px;font-weight:600;color:#0F172A}
.sec-body{overflow-x:auto}
.sec-pad{padding:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#F8FAFC;border-bottom:1.5px solid #E2E8F0}
th{padding:7px 11px;text-align:left;color:#94A3B8;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
th.r{text-align:right}
td{padding:7px 11px;border-bottom:1px solid #F8FAFC;color:#1E293B;vertical-align:middle}
td.r{text-align:right}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFAFA}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1px solid #E2E8F0;background:#fff;color:#374151;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn:hover{background:#F8FAFC}
.btn.primary{background:#0F172A;color:#fff;border-color:#0F172A}
.btn.primary:hover{background:#1E293B}
.btn.success{background:#15803D;color:#fff;border-color:#15803D}
.btn.danger{background:#FEF2F2;color:#B91C1C;border-color:#FCA5A5}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.xs{padding:2px 7px;font-size:10px}
.fbar{display:flex;gap:7px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.fbar input,.fbar select{height:32px;font-size:12px}
.ftab{padding:3px 11px;border-radius:14px;border:1px solid #E2E8F0;background:#fff;color:#64748B;font-size:11px;cursor:pointer;transition:all .12s}
.ftab.on{font-weight:600}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap input{padding-left:28px;height:32px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-head{padding:13px 18px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;flex-shrink:0}
.modal-head h3{margin:0;font-size:13px;font-weight:700;color:#0F172A}
.modal-body{padding:16px 18px;flex:1}
.modal-foot{padding:10px 18px 14px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #F1F5F9;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
.field label{display:block;font-size:10px;font-weight:600;color:#374151;margin-bottom:3px}
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;margin-bottom:5px;font-size:11px}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0F172A;padding:16px}
.login-box{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:380px}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-seg{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bar-lbl{font-size:9px;color:#94A3B8;white-space:nowrap}
.prog-bar{background:#F1F5F9;border-radius:3px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.tab-row{display:flex;border-bottom:1px solid #E2E8F0;margin-bottom:14px;flex-wrap:wrap}
.tab-item{padding:8px 14px;font-size:12px;color:#64748B;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab-item.on{color:#2563EB;border-bottom-color:#2563EB;font-weight:600}
.lote-bar{display:flex;gap:6px;padding:8px 14px;background:#F8FAFC;border-bottom:1px solid #F1F5F9;align-items:center;flex-wrap:wrap}

<script>
// ── FIREBASE ──────────────────────────────────────────────────────────────────
var FB=firebase.initializeApp({

});
var FA=firebase.auth();
var FS=firebase.firestore();
var DB_REF=FS.collection("erp_data").doc("escola_v1");

// ── UTILS ─────────────────────────────────────────────────────────────────────
var h=function(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="class") el.className=attrs[k];
    else if(k==="style"&&typeof attrs[k]==="object") Object.assign(el.style,attrs[k]);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else el.setAttribute(k,attrs[k]);
  });
  if(children!=null)[].concat(children).forEach(function(c){
    if(c==null||c===false) return;
    try{ el.appendChild(c instanceof Node?c:document.createTextNode(String(c))); }catch(e){}
  });
  return el;
};
var zp=function(n){return String(n).padStart(2,"0");};
var BRL=function(v){return "R$ "+((+v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}));};
var PCT=function(v){return (((+v||0)*100).toFixed(1))+"%";};
var DT=function(s){try{var p=s.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:s;}catch(e){return s||"";}};
var today=function(){var d=new Date();return d.getFullYear()+"-"+zp(d.getMonth()+1)+"-"+zp(d.getDate());};
var addDias=function(n){var d=new Date(Date.now()+n*864e5);return d.getFullYear()+"-"+zp(d.getMonth()+1)+"-"+zp(d.getDate());};
var NOW=new Date();var ANO=NOW.getFullYear();var MES=NOW.getMonth()+1;
var MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ── CONSTANTES ────────────────────────────────────────────────────────────────
var CATS_PAGAR=["Royalties/Franquia","Aluguel","Salarios Professores","Salarios Administrativos","Material Didatico","Energia/Agua/Internet","Marketing","Impostos e Taxas","Manutencao","Seguros","Outras Despesas"];
var CATS_RECEBER=["Mensalidades","Matriculas","Material Didatico","Atividades Extras","Saldo Inicial","Outras Receitas"];
var FORMAS_PG=["Boleto","PIX","Cartao Credito","Cartao Debito","Transferencia","Cheque","Dinheiro"];
var STATUS_PG=["Pendente","Pago","Vencido","Cancelado"];
var STATUS_REC=["Pendente","Recebido","Vencido","Cancelado"];
var TURMAS=["Infantil I","Infantil II","Fund. I","Fund. II","Fund. III","Integral","Avancado","Outro"];
var TIPOS_CONTATO=["Cliente","Fornecedor","Professor","Pais","Cliente e Fornecedor","Outro"];
var TIPO_CORES={
  "Cliente":    ["#1D4ED8","#DBEAFE"],
  "Fornecedor": ["#6D28D9","#EDE9FE"],
  "Professor":  ["#0F766E","#CCFBF1"],
  "Pais":       ["#B45309","#FEF3C7"],
  "Cliente e Fornecedor":["#15803D","#DCFCE7"],
  "Outro":      ["#64748B","#F1F5F9"],
};
var ROLES={
  admin:      {label:"Administrador",cor:"#B91C1C",bg:"#FEE2E2",mods:["dash","pagar","receber","clientes","fluxo","alunos","cursos","rel","config"]},
  financeiro: {label:"Financeiro",   cor:"#C2410C",bg:"#FFEDD5",mods:["dash","pagar","receber","clientes","fluxo","rel"]},
  operacional:{label:"Operacional",  cor:"#15803D",bg:"#DCFCE7",mods:["dash","alunos","cursos","clientes"]}
};

// ── USUÁRIOS ──────────────────────────────────────────────────────────────────
var PROF_MAP={
  "ffilho@schoolofrock.com":{nome:"Admin",role:"admin",av:"FF"},
  "admin@escola.com":       {nome:"Administrador",role:"admin",av:"AD"},
};
function loadCustomUsers(){try{var s=localStorage.getItem("erp_usuarios");return s?JSON.parse(s):[];}catch(e){return[];}}
var CUSTOM_USERS=loadCustomUsers();
function getProfile(email){
  if(PROF_MAP[email]) return PROF_MAP[email];
  var cu=CUSTOM_USERS.find(function(u){return u.email===email;});
  return cu?{nome:cu.nome,role:cu.role,av:cu.av}:null;
}
function saveCustomUsers(arr){
  CUSTOM_USERS=arr;
  localStorage.setItem("erp_usuarios",JSON.stringify(arr));
  if(DB){DB.usuarios=arr;saveDB();}
}

// ── STATE & DB ────────────────────────────────────────────────────────────────
var STATE={user:null,mod:"dash",modal:null,loteSelected:{}};
var DB=null;
var _dbReady=false;
var _dbUnsubscribe=null;
var _inModalSave=false;

function maxId(arr){return arr&&arr.length>0?Math.max.apply(null,arr.map(function(x){return +x.id||0;})):0;}
function canDelete(){return STATE.user&&STATE.user.role==="admin";}

function saveDB(){
  DB.updatedAt=Date.now();
  DB.usuarios=CUSTOM_USERS;
  try{localStorage.setItem("erp_escola",JSON.stringify(DB));}catch(e){}
  if(STATE.user){
    try{DB_REF.set(JSON.parse(JSON.stringify(DB))).catch(function(e){console.warn("FS save:",e.code);});}catch(e){}
  }
}

function atualizarStatus(){
  var hoje=today();var changed=false;
  ["pagar","receber"].forEach(function(k){
    (DB[k]||[]).forEach(function(r){
      if(r.status==="Pendente"&&r.venc&&r.venc<hoje){r.status="Vencido";changed=true;}
    });
  });
  if(changed) saveDB();
}

function iniciarListenerDB(){
  if(_dbUnsubscribe) return;
  // 1) Carrega local imediatamente
  var local=null;
  try{var s=localStorage.getItem("erp_escola");var p=s?JSON.parse(s):null;if(p&&p.pagar)local=p;}catch(e){}
  DB=local||seedDB();
  if(!local) try{localStorage.setItem("erp_escola",JSON.stringify(DB));}catch(e){}
  if(DB.usuarios) CUSTOM_USERS=DB.usuarios;
  atualizarStatus();
  _dbReady=true;
  render();
  // 2) Sincroniza Firestore em background
  try{
    _dbUnsubscribe=DB_REF.onSnapshot(function(doc){
      if(doc.exists){
        var fs=doc.data();
        if((fs.updatedAt||0)>(DB.updatedAt||0)){
          DB=fs;
          if(DB.usuarios) CUSTOM_USERS=DB.usuarios;
          try{localStorage.setItem("erp_escola",JSON.stringify(DB));}catch(e){}
          atualizarStatus();
          render();
        }
      } else {
        DB.updatedAt=Date.now();
        DB_REF.set(JSON.parse(JSON.stringify(DB))).catch(function(e){console.warn(e.code);});
      }
    },function(err){console.warn("FS offline:",err.code);});
  }catch(e){console.warn("FS connect:",e);}
}

function pararListenerDB(){
  if(_dbUnsubscribe){try{_dbUnsubscribe();}catch(e){}_dbUnsubscribe=null;}
  _dbReady=false;DB=null;
}

function upd(key,fn){
  try{DB[key]=fn(DB[key]||[]);saveDB();}catch(e){console.error("upd:",key,e);}
  if(!_inModalSave) render();
}

// ── SEED ──────────────────────────────────────────────────────────────────────
function seedDB(){
  var db={pagar:[],receber:[],clientes:[],fornec:[],alunos:[],cursos:[],fluxo:[],contasBancarias:[],usuarios:[],
    config:{escola:"Minha Escola",cidade:"",cnpj:"",pixKey:"",pixTipo:"CNPJ",pixBanco:"",pixAgencia:"",pixConta:""}};

    {id:3,nome:"Receita Federal",tipo:"Fornecedor",cat:"Impostos e Taxas",tel:"",email:"",status:"Ativo",obs:""},
  ];
  db.fornec=fornecs;
  var nomes=["Lucas Andrade","Beatriz Costa","Gabriel Silva","Sofia Martins","Pedro Rocha"];

    db.clientes.push({id:i+1,nome:nome,cnpjCpf:"",tipo:"Cliente",cat:"Aluno",tel:"",email:"",cidade:"",estado:"",status:"Ativo",obs:""});
    db.receber.push({id:i+1,cliente:nome,alunoId:i+1,desc:"Mensalidade "+MESES[MES-1]+" "+ANO,cat:"Mensalidades",valor:800+i*50,venc:ANO+"-"+zp(MES)+"-10",dtRec:"",status:i===0?"Recebido":"Pendente",forma:"Boleto",conta:"",obs:""});
  });
  var cursosBase=[
    {id:1,cod:"C001",nome:"Turma Infantil I",cat:"Regular",un:"mes",custo:350,preco:800,obs:""},
    {id:2,cod:"C002",nome:"Turma Infantil II",cat:"Regular",un:"mes",custo:380,preco:850,obs:""},
    {id:3,cod:"C003",nome:"Turma Fundamental",cat:"Regular",un:"mes",custo:420,preco:950,obs:""},
    {id:4,cod:"M001",nome:"Kit Material",cat:"Material",un:"un",custo:80,preco:150,obs:""},
  ];
  db.cursos=cursosBase;
  var pid=1;
  [[fornecs[0].nome,"Royalties "+MESES[MES-1],CATS_PAGAR[0],8500],[fornecs[1].nome,"Aluguel "+MESES[MES-1],CATS_PAGAR[1],5000],[fornecs[2].nome,"DARF Simples",CATS_PAGAR[7],1800]].forEach(function(r){
    db.pagar.push({id:pid++,forn:r[0],desc:r[1],cat:r[2],valor:r[3],venc:ANO+"-"+zp(MES)+"-10",dtPag:"",status:"Pendente",forma:"Transferencia",conta:"",parcelas:1,obs:""});
  });
  for(var m=Math.max(1,MES-2);m<=MES;m++){
    db.fluxo.push({id:db.fluxo.length+1,data:ANO+"-"+zp(m)+"-01",desc:"Mensalidades "+MESES[m-1],cat:"Mensalidades",tipo:"Entrada",valor:Math.round(42000*(1+(m-1)*0.02)),conta:"Conta Principal",conc:m<MES,obs:""});
    db.fluxo.push({id:db.fluxo.length+1,data:ANO+"-"+zp(m)+"-05",desc:"Aluguel "+MESES[m-1],cat:"Aluguel",tipo:"Saida",valor:5000,conta:"Conta Principal",conc:m<MES,obs:""});
    db.fluxo.push({id:db.fluxo.length+1,data:ANO+"-"+zp(m)+"-10",desc:"Royalties "+MESES[m-1],cat:"Royalties/Franquia",tipo:"Saida",valor:8500,conta:"Conta Principal",conc:m<MES,obs:""});
    db.fluxo.push({id:db.fluxo.length+1,data:ANO+"-"+zp(m)+"-15",desc:"Salarios "+MESES[m-1],cat:"Salarios Professores",tipo:"Saida",valor:18000,conta:"Conta Principal",conc:m<MES,obs:""});
  }
  return db;
}

// ── ICONS ─────────────────────────────────────────────────────────────────────

function importCSV(onData){
  var inp=document.createElement("input");inp.type="file";inp.accept=".csv";
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      var lines=e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
      if(lines.length<2)return alert("Arquivo vazio.");
      var headers=lines[0].split(";");
      var rows=lines.slice(1).map(function(line){var vals=line.split(";");var obj={};headers.forEach(function(hh,i){obj[hh.trim()]=vals[i]?vals[i].trim():"";});return obj;});
      onData(rows);
    };
    reader.readAsText(file,"UTF-8");
  };
  inp.click();
}

function buildModal(){
  if(!STATE.modal)return null;
  var m=STATE.modal;
  var form=Object.assign({},m.data);
  var bg=h("div",{"class":"modal-bg",onclick:function(e){if(e.target===bg)closeModal();}},null);
  var box=h("div",{"class":"modal"},null);bg.appendChild(box);

  var body=h("div",{"class":"modal-body"},null);
  var foot=h("div",{"class":"modal-foot"},null);

  var saveBtn=h("button",{"class":"btn primary",onclick:function(){
    if(!m.onSave){closeModal();return;}
    if(!m.async){
      STATE.modal=null;_inModalSave=true;
      try{m.onSave(Object.assign({},form));}catch(e){console.error(e);}
      _inModalSave=false;render();return;
    }
    try{m.onSave(Object.assign({},form));}catch(e){console.error(e);}
  }},null);
  var si=h("span",{style:{lineHeight:"0",display:"inline-flex",alignItems:"center",gap:"4px"}},null);si.innerHTML=S.check;si.appendChild(document.createTextNode(" Salvar"));saveBtn.appendChild(si);foot.appendChild(saveBtn);
  box.appendChild(head);box.appendChild(body);box.appendChild(foot);
  // CNPJ lookup
  function buscarCNPJ(cnpj){
    var clean=cnpj.replace(/[^0-9]/g,"");
    var msgEl=body.querySelector(".cnpj-msg");
    if(clean.length===11){
      // CPF — Receita Federal nao disponibiliza consulta publica de CPF
      if(msgEl){msgEl.style.color="#B45309";msgEl.textContent="CPF inserido. Consulta de CPF nao disponivel — preencha os dados manualmente.";}
      return;
    }
    if(clean.length!==14){
      if(msgEl){msgEl.style.color="#B91C1C";msgEl.textContent="Digite um CNPJ (14 digitos) ou CPF (11 digitos).";}
      return;
    }
    if(msgEl){msgEl.style.color="#2563EB";msgEl.textContent="Buscando na Receita Federal...";}
    fetch("https://brasilapi.com.br/api/cnpj/v1/"+clean)
      .then(function(r){
        if(!r.ok) throw new Error("not_found");
        return r.json();
      })
      .then(function(d){
        if(!d.cnpj) throw new Error("not_found");
        form.nome=d.razao_social||form.nome;
        form.cnpjCpf=cnpj;
        form.cat=d.cnae_fiscal_descricao||form.cat;
        form.cidade=d.municipio||form.cidade;
        form.estado=d.uf||form.estado;
        form.email=d.email&&d.email!=="NAO INFORMADO"?d.email:form.email;
        form.tel=d.ddd_telefone_1||form.tel;
        body.querySelectorAll("input,select").forEach(function(inp){
          var k=inp.getAttribute("data-field");
          if(k&&form[k]!=null&&form[k]!=="") inp.value=form[k];
        });
        if(msgEl){msgEl.style.color="#15803D";msgEl.textContent="✓ Encontrado: "+d.razao_social;}
      })
      .catch(function(e){
        if(msgEl){msgEl.style.color="#B91C1C";msgEl.textContent=e.message==="not_found"?"CNPJ nao encontrado na Receita Federal.":"Erro de conexao. Verifique sua internet.";}
      });
  }
  var grid=h("div",{"class":"form-grid"},null);
  var hasCnpj=(m.fields||[]).some(function(f){return f&&f.k==="cnpjCpf";});
  if(hasCnpj){
    var cnpjRow=h("div",{style:{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px",flexWrap:"wrap"}},null);
    var cnpjMsg=h("span",{"class":"cnpj-msg",style:{fontSize:"11px",color:"#2563EB",flex:"1"}},"\uD83D\uDCA1 Para CNPJ: digite e clique Buscar para preencher automaticamente.");
    var cnpjBtn=h("button",{"class":"btn sm",onclick:function(){buscarCNPJ(form.cnpjCpf||"");}},null);
    cnpjBtn.appendChild(ico("globe","#2563EB",11));cnpjBtn.appendChild(document.createTextNode(" Buscar na Receita Federal"));
    cnpjRow.appendChild(cnpjMsg);cnpjRow.appendChild(cnpjBtn);
    body.appendChild(cnpjRow);
  }
  (m.fields||[]).forEach(function(f){
    if(!f)return;
    if(f.type==="divider"){grid.appendChild(h("div",{style:{gridColumn:"1/-1",borderTop:"1px solid #F1F5F9",paddingTop:"10px",fontWeight:"600",fontSize:"11px",color:"#374151"}},f.label));return;}
    var wrap=h("div",{"class":"field"+(f.full?" full":"")},null);
    if(f.label)wrap.appendChild(h("label",null,f.label+(f.req?" *":"")));
    var inp;

      inp=h("select",{"data-field":f.k,onchange:function(){var v=inp.value,n=+v;form[f.k]=(v!==""&&!isNaN(n)&&String(n)===v)?n:v;if(f.onChange)f.onChange(form[f.k],form);}},null);
      inp.appendChild(h("option",{value:""},"Selecione..."));
      (f.options||[]).forEach(function(o){var op=h("option",{value:o.value!==undefined?o.value:o},o.label||o);if(String(form[f.k]||"")===(String(o.value!==undefined?o.value:o)))op.selected=true;inp.appendChild(op);});
    } else if(f.type==="textarea"){
      inp=h("textarea",{oninput:function(){form[f.k]=inp.value;}},null);inp.value=form[f.k]||"";
    } else if(f.type==="checkbox"){
      var row2=h("div",{style:{display:"flex",alignItems:"center",gap:"7px"}},null);
      var cb=h("input",{type:"checkbox"},null);cb.checked=!!form[f.k];
      cb.addEventListener("change",function(){form[f.k]=cb.checked;});
      row2.appendChild(cb);row2.appendChild(h("span",{style:{fontSize:"12px"}},f.label));

      inp.value=form[f.k]!=null?form[f.k]:"";
    }
    if(inp)wrap.appendChild(inp);
    grid.appendChild(wrap);
  });
  body.appendChild(grid);
  if(m.extra)body.appendChild(m.extra);

function registrarLote(key,dt,forma){
  var ids=Object.keys(STATE.loteSelected).filter(function(id){return STATE.loteSelected[id];});
  if(!ids.length)return alert("Selecione ao menos um registro.");

      var sf=key==="pagar"?"Pago":"Recebido";var df=key==="pagar"?"dtPag":"dtRec";
      var u2=Object.assign({},r);u2.status=sf;u2[df]=dt||today();u2.forma=forma||u2.forma;return u2;
    }
    return r;
  });});
  STATE.loteSelected={};
}

// ── COBRANÇAS MENSAIS ─────────────────────────────────────────────────────────
function gerarCobrancasMensais(mes,ano){
  var alunos=(DB.alunos||[]).filter(function(a){return a.status==="Ativo";});
  var criados=0;
  alunos.forEach(function(a){
    var jaExiste=(DB.receber||[]).some(function(r){return r.alunoId===a.id&&r.venc.startsWith(ano+"-"+zp(mes));});
    if(!jaExiste){
      DB.receber.push({id:maxId(DB.receber)+1,cliente:a.nome,alunoId:a.id,desc:"Mensalidade "+MESES[mes-1]+" "+ano,cat:"Mensalidades",valor:a.mens,venc:ano+"-"+zp(mes)+"-10",dtRec:"",status:"Pendente",forma:"Boleto",conta:"",obs:""});
      criados++;
    }
  });
  if(criados)saveDB();
  return criados;
}

  box.appendChild(h("label",{style:{display:"block",fontSize:"10px",fontWeight:"600",color:"#374151",marginBottom:"3px"}},"Senha"));

  var pwdInp=h("input",{type:"password",placeholder:"Sua senha",style:{paddingRight:"36px",margin:"0",width:"100%"}},null);
  var eyeBtn=h("button",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",lineHeight:"0",color:"#94A3B8",padding:"4px"},onclick:function(){pwdInp.type=pwdInp.type==="password"?"text":"password";eyeBtn.innerHTML=pwdInp.type==="password"?S.eye:S.eyeoff;}},null);
  eyeBtn.innerHTML=S.eye;pwdWrap.appendChild(pwdInp);pwdWrap.appendChild(eyeBtn);box.appendChild(pwdWrap);
  var errMsg=h("p",{style:{color:"#B91C1C",fontSize:"11px",marginBottom:"6px",display:"none"}},"");
  var loginBtn=h("button",{style:{width:"100%",padding:"10px",borderRadius:"8px",background:"#0F172A",color:"#fff",fontSize:"13px",fontWeight:"600",cursor:"pointer"},onclick:function(){
    var email=emailInp.value.trim();var pwd=pwdInp.value;
    if(!email||!pwd){errMsg.textContent="Preencha email e senha.";errMsg.style.display="block";return;}
    loginBtn.disabled=true;loginBtn.textContent="Entrando...";
    FA.signInWithEmailAndPassword(email,pwd).catch(function(e){
      loginBtn.disabled=false;loginBtn.textContent="Entrar";
      var msg="Email ou senha incorretos";
      if(e.code==="auth/too-many-requests")msg="Muitas tentativas. Aguarde.";
      if(e.code==="auth/network-request-failed")msg="Erro de rede.";
      errMsg.textContent=msg;errMsg.style.display="block";
    });
  }},"Entrar");
  pwdInp.addEventListener("keydown",function(e){if(e.key==="Enter")loginBtn.click();});
  emailInp.addEventListener("keydown",function(e){if(e.key==="Enter")pwdInp.focus();});
  box.appendChild(errMsg);box.appendChild(loginBtn);
  box.appendChild(h("p",{style:{textAlign:"center",fontSize:"9px",color:"#CBD5E1",marginTop:"12px"}},"Dados salvos na nuvem — acesse de qualquer dispositivo"));
  return bg;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
FA.onAuthStateChanged(function(fbUser){
  if(fbUser){
    var p=getProfile(fbUser.email)||{nome:fbUser.email.split("@")[0],role:"operacional",av:fbUser.email.substring(0,2).toUpperCase()};
    STATE.user=Object.assign({uid:fbUser.uid,email:fbUser.email},p);
    STATE.mod="dash";
    iniciarListenerDB();
  } else {
    pararListenerDB();
    STATE.user=null;
    render();
  }
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById("app");if(!root)return;
  root.innerHTML="";
  if(!STATE.user){root.appendChild(renderLogin());return;}
  if(!_dbReady||!DB){root.appendChild(h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0F172A"}},h("div",{style:{color:"#94A3B8",fontSize:"14px"}},"Carregando...")));return;}

  var modal=buildModal();
  var perm=ROLES[STATE.user.role]?ROLES[STATE.user.role].mods:[];
  var u=STATE.user;var rc=ROLES[u.role]||{};
  var ALL_NAV=[
    {id:"dash",label:"Dashboard",icn:"dash"},
    {id:"pagar",label:"Contas a Pagar",icn:"pagar"},
    {id:"receber",label:"Contas a Receber",icn:"receber"},
    {id:"clientes",label:"Clientes e Fornecedores",icn:"clientes"},
    {id:"fluxo",label:"Movimentacao de Caixa",icn:"fluxo"},
    {id:"alunos",label:"Alunos",icn:"alunos"},
    {id:"cursos",label:"Cursos e Produtos",icn:"cursos"},
    {id:"rel",label:"Relatorios",icn:"rel"},
    {id:"config",label:"Configuracoes",icn:"config"},
  ];
  var nav=ALL_NAV.filter(function(n){return perm.indexOf(n.id)>=0;});
  var alertCount=(DB.pagar||[]).filter(function(p){return p.status==="Vencido";}).length+(DB.receber||[]).filter(function(r){return r.status==="Vencido";}).length;
  // Sidebar
  var aside=h("aside",{"class":"sidebar"},null);
  var logo=h("div",{"class":"sb-logo",onclick:function(){aside.classList.toggle("closed");}},null);
  var mc=h("span",{style:{lineHeight:"0",color:"#94A3B8",flexShrink:"0"}},null);mc.innerHTML=S.menu;logo.appendChild(mc);
  var escolaNome=(DB.config&&DB.config.escola)||"ERP Escolar";
  logo.appendChild(h("div",null,[h("div",{"class":"sb-logo-title"},escolaNome),h("div",{"class":"sb-logo-sub"},"Sistema de Gestao")]));
  aside.appendChild(logo);
  var navDiv=h("div",{"class":"sb-nav"},null);
  nav.forEach(function(n){
    var active=STATE.mod===n.id;
    var item=h("div",{"class":"sb-item"+(active?" active":""),onclick:function(){STATE.mod=n.id;render();}},null);
    var ic2=h("span",{style:{lineHeight:"0",color:active?"#60A5FA":"#4B5563",flexShrink:"0"}},null);ic2.innerHTML=S[n.icn]||S.dash;item.appendChild(ic2);
    item.appendChild(h("span",{"class":"sb-item-label"},n.label));
    if(n.id==="dash"&&alertCount>0)item.appendChild(h("span",{"class":"sb-badge"},String(alertCount)));
    navDiv.appendChild(item);
  });
  aside.appendChild(navDiv);
  var sbUsr=h("div",{"class":"sb-user"},null);
  var uRow=h("div",{"class":"sb-user-row"},null);
  uRow.appendChild(h("div",{"class":"sb-avatar",style:{background:rc.bg||"#eee",color:rc.cor||"#333"}},u.av||"?"));
  uRow.appendChild(h("div",{style:{flex:"1",minWidth:"0"}},[h("div",{"class":"sb-name"},u.nome||""),h("div",{"class":"sb-role"},rc.label||u.role)]));
  var logBtn=h("button",{style:{color:"#475569",lineHeight:"0",padding:"3px"},onclick:function(){FA.signOut();},title:"Sair"},null);logBtn.innerHTML=S.logout;uRow.appendChild(logBtn);sbUsr.appendChild(uRow);aside.appendChild(sbUsr);
  // Main
  var main=h("div",{"class":"main"},null);
  var topbar=h("div",{"class":"topbar"},null);
  topbar.appendChild(h("span",{"class":"topbar-title"},(nav.find(function(n){return n.id===STATE.mod;})||{label:""}).label));
  var darkBtn=h("button",{"class":"btn sm",style:{padding:"4px 8px",lineHeight:"0"},title:"Modo noturno",onclick:function(){document.body.classList.toggle("dark");localStorage.setItem("erp_dark",document.body.classList.contains("dark")?"1":"0");darkBtn.innerHTML=document.body.classList.contains("dark")?S.sun:S.moon;}},null);
  var isDark=localStorage.getItem("erp_dark")==="1";if(isDark)document.body.classList.add("dark");darkBtn.innerHTML=isDark?S.sun:S.moon;
  var tRight=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[h("span",{style:{fontSize:"10px",color:"#CBD5E1"}},new Date().toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short"})),darkBtn]);
  topbar.appendChild(tRight);main.appendChild(topbar);
  var PAGES={dash:pageDash,pagar:pagePagar,receber:pageReceber,clientes:pageClientes,fluxo:pageFluxo,alunos:pageAlunos,cursos:pageCursos,rel:pageRel,config:pageConfig};
  main.appendChild((PAGES[STATE.mod]||pageDash)());
  var app2=h("div",{"class":"app"},null);app2.appendChild(aside);app2.appendChild(main);
  root.appendChild(app2);
  if(modal)root.appendChild(modal);
}

render();
</script>
